<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication - CodeCart</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-dark: #0a192f;
      --primary: #112240;
      --primary-light: #172a45;
      --secondary: #64ffda;
      --accent: #ffd166;
      --security-green: #64ff8d;
      --text-primary: #e6f1ff;
      --text-secondary: #a8b2d1;
      --card-bg: #112240;
      --card-border: rgba(100, 255, 218, 0.1);
      --success: #64ffda;
      --warning: #ffd166;
      --danger: #ff6b6b;
      --transition: all 0.3s ease-in-out;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: var(--text-primary);
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(100, 255, 218, 0.05) 0%, transparent 15%),
        radial-gradient(circle at 90% 80%, rgba(255, 209, 102, 0.05) 0%, transparent 15%),
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect x="0" y="0" width="100" height="100" fill="none" stroke="rgba(100,255,218,0.05)" stroke-width="0.5" stroke-dasharray="2 2"/><circle cx="20" cy="20" r="1" fill="rgba(100,255,218,0.1)"/><circle cx="50" cy="50" r="1" fill="rgba(100,255,218,0.1)"/><circle cx="80" cy="80" r="1" fill="rgba(100,255,218,0.1)"/></svg>');
      background-size: 300px 300px;
      z-index: -1;
      opacity: 0.15;
    }

    .auth-container {
      background: var(--primary);
      border-radius: 10px;
      width: 400px;
      max-width: 100%;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(100, 255, 218, 0.1);
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 0.8rem;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 500;
      transition: var(--transition);
      position: relative;
    }

    .auth-tab.active {
      color: var(--secondary);
    }

    .auth-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--secondary);
    }

    .auth-tab:hover {
      color: var(--secondary);
    }

    .auth-content {
      display: none;
    }

    .auth-content.active {
      display: block;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h2 {
      color: var(--secondary);
      margin-bottom: 0.5rem;
    }

    .auth-header p {
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--primary-light);
      border: 1px solid rgba(100, 255, 218, 0.1);
      border-radius: 4px;
      color: var(--text-primary);
      transition: var(--transition);
    }

    .form-group input:focus {
      border-color: var(--secondary);
      outline: none;
      box-shadow: 0 0 0 2px rgba(100, 255, 218, 0.2);
    }

    .auth-footer {
      margin-top: 1.5rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--secondary);
      text-decoration: none;
      transition: var(--transition);
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .auth-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--secondary);
      color: var(--primary-dark);
      border: none;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 1rem;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(100, 255, 218, 0.3);
    }

    .back-to-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--secondary);
      text-decoration: none;
      margin-top: 1.5rem;
      transition: var(--transition);
    }

    .back-to-home:hover {
      gap: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <a href="{{ url_for('home') }}" class="back-to-home">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
    
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Sign In</div>
      <div class="auth-tab" data-tab="signup">Create Account</div>
    </div>
    
    <!-- Login Form -->
    <div id="loginContent" class="auth-content active">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to access your developer resources</p>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="auth-btn">Sign In</button>
        
        <div class="auth-footer">
          <a href="#" id="forgotPassword">Forgot password?</a>
        </div>
      </form>
    </div>
    
    <!-- Signup Form -->
    <div id="signupContent" class="auth-content">
      <div class="auth-header">
        <h2>Create Your Account</h2>
        <p>Join CodeCart to access premium developer resources</p>
      </div>
      
      <form id="signupForm">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="Enter your full name" required>
        </div>
        
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Create a password (min 8 chars)" required>
        </div>
        
        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Confirm your password" required>
        </div>
        
        <button type="submit" class="auth-btn">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Tab switching
      const tabs = document.querySelectorAll('.auth-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          document.querySelectorAll('.auth-content').forEach(content => {
            content.classList.remove('active');
          });
          document.getElementById(`${tab.dataset.tab}Content`).classList.add('active');
        });
      });

      // Login form
      const loginForm = document.getElementById('loginForm');
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
          alert('Please fill in all fields');
          return;
        }
        
        // Simulate login
        alert(`Login successful! Welcome back, ${email.split('@')[0]}`);
        
        // Redirect to home page
        window.location.href = "{{ url_for('home') }}";
      });

      // Signup form
      const signupForm = document.getElementById('signupForm');
      signupForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const confirmPassword = document.getElementById('signupConfirm').value;
        
        if (!name || !email || !password || !confirmPassword) {
          alert('Please fill in all fields');
          return;
        }
        
        if (password !== confirmPassword) {
          alert('Passwords do not match!');
          return;
        }
        
        if (password.length < 8) {
          alert('Password must be at least 8 characters long');
          return;
        }
        
        // Simulate signup
        alert(`Account created successfully! Welcome to CodeCart, ${name}`);
        
        // Switch to login tab
        document.querySelector('.auth-tab[data-tab="login"]').click();
      });

      // Forgot password
      document.getElementById('forgotPassword').addEventListener('click', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        if (email) {
          alert(`Password reset link will be sent to: ${email}`);
        } else {
          alert('Please enter your email address first');
        }
      });
    });
  </script>
</body>
</html>
