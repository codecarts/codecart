<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - CodeCart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0a192f;
            --primary: #112240;
            --primary-light: #172a45;
            --secondary: #64ffda;
            --accent: #ffd166;
            --security-green: #64ff8d;
            --text-primary: #e6f1ff;
            --text-secondary: #a8b2d1;
            --card-bg: #112240;
            --card-border: rgba(100, 255, 218, 0.1);
            --success: #64ffda;
            --warning: #ffd166;
            --danger: #ff6b6b;
            --transition: all 0.3s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        /* Security background pattern */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(100, 255, 218, 0.05) 0%, transparent 15%),
                radial-gradient(circle at 90% 80%, rgba(255, 209, 102, 0.05) 0%, transparent 15%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect x="0" y="0" width="100" height="100" fill="none" stroke="rgba(100,255,218,0.05)" stroke-width="0.5" stroke-dasharray="2 2"/><circle cx="20" cy="20" r="1" fill="rgba(100,255,218,0.1)"/><circle cx="50" cy="50" r="1" fill="rgba(100,255,218,0.1)"/><circle cx="80" cy="80" r="1" fill="rgba(100,255,218,0.1)"/></svg>');
            background-size: 300px 300px;
            z-index: -1;
            opacity: 0.15;
        }

        .contact-container {
            max-width: 600px;
            margin: 4rem auto;
            background: rgba(17, 34, 64, 0.7);
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .contact-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--secondary);
        }

        h2 {
            color: var(--secondary);
            font-size: 2.2rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--secondary);
        }

        .contact-form .form-group {
            margin-bottom: 1.8rem;
        }

        .contact-form label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 500;
            color: var(--secondary);
            font-size: 1rem;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(10, 25, 47, 0.5);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 6px;
            font-size: 1rem;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 2px rgba(100, 255, 218, 0.2);
        }

        .contact-form textarea {
            min-height: 180px;
            resize: vertical;
        }

        .form-actions {
            text-align: center;
            margin-top: 2rem;
        }

        .button {
            padding: 0.9rem 2.5rem;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .button-primary {
            background: var(--secondary);
            color: var(--primary-dark);
        }

        .button-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(100, 255, 218, 0.3);
        }

        .status-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .success {
            background: rgba(100, 255, 218, 0.1);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }

        .error {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .fa-paper-plane {
            transition: var(--transition);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .contact-container {
                padding: 2rem;
                margin: 2rem auto;
            }
            
            h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            
            .contact-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h2>Contact Us</h2>
        <form class="contact-form" id="contactForm" action="/contact_submit" method="POST">
            <div class="form-group">
                <label for="contactName">Your Name</label>
                <input type="text" id="contactName" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="contactEmail">Your Email</label>
                <input type="email" id="contactEmail" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="contactMessage">Your Message</label>
                <textarea id="contactMessage" name="message" rows="5" required></textarea>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="button button-primary">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>
            </div>
        </form>
        
        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const statusMessage = document.getElementById('statusMessage');
            const submitButton = form.querySelector('button[type="submit"]');
            const paperPlaneIcon = submitButton.querySelector('.fa-paper-plane');
            
            // Show loading state
            submitButton.disabled = true;
            paperPlaneIcon.classList.replace('fa-paper-plane', 'fa-spinner');
            paperPlaneIcon.classList.add('fa-spin');
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.text();
                
                statusMessage.style.display = 'block';
                
                if (response.ok) {
                    statusMessage.className = 'status-message success';
                    statusMessage.textContent = result;
                    form.reset();
                } else {
                    statusMessage.className = 'status-message error';
                    statusMessage.textContent = result;
                }
            } catch (error) {
                statusMessage.style.display = 'block';
                statusMessage.className = 'status-message error';
                statusMessage.textContent = 'Network error: Could not submit the form.';
            } finally {
                submitButton.disabled = false;
                paperPlaneIcon.classList.replace('fa-spinner', 'fa-paper-plane');
                paperPlaneIcon.classList.remove('fa-spin');
                submitButton.innerHTML = '<i class="fas fa-paper-plane"></i> Send Message';
            }
        });
    </script>
</body>
</html>
