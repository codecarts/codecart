<!DOCTYPE html>
<html>
<head>
    <title>Upload a Note</title>
</head>
<body>
    <h2>Upload a Note</h2>
    <form method="POST" enctype="multipart/form-data">
        Title: <input type="text" name="title" required><br><br>
        Description:<br>
        <textarea name="description" rows="6" cols="50"></textarea><br><br>
        Upload File (.pdf or .pptx): <input type="file" name="file" accept=".pdf,.pptx" required><br><br>
        <input type="submit" value="Upload">
    </form>
</body>
</html>
